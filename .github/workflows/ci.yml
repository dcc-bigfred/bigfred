name: CI

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
          cache: true

      - name: Run tests
        run: go test -count=1 ./...

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: .exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
          cache: true

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          mkdir -p "dist/${GOOS}-${GOARCH}"
          CGO_ENABLED=0 go build -o "dist/${GOOS}-${GOARCH}/loco-server${{ matrix.ext }}" ./pkgs/bigfred/server
          CGO_ENABLED=0 go build -o "dist/${GOOS}-${GOARCH}/loco${{ matrix.ext }}" ./pkgs/loco
          go build -o "dist/${GOOS}-${GOARCH}/rb${{ matrix.ext }}" ./pkgs/rb/main.go

      - name: Upload platform binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/
          if-no-files-found: error
          retention-days: 30

  package-artifacts:
    name: Package build artifacts
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download platform binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          merge-multiple: true
          path: dist

      - name: Upload combined binaries artifact
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: dist/
          if-no-files-found: error
          retention-days: 90
