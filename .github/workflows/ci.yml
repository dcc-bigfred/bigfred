name: CI

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
          cache: true

      - name: Run tests
        run: go test -count=1 ./...

  build:
    name: Build (linux/amd64)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
          cache: true

      - name: Build binaries
        run: |
          set -euo pipefail
          mkdir -p dist/linux-amd64
          CGO_ENABLED=0 go build -o dist/linux-amd64/loco-server ./pkgs/bigfred/server
          CGO_ENABLED=0 go build -o dist/linux-amd64/loco ./pkgs/loco
          go build -o dist/linux-amd64/rb ./pkgs/rb/main.go

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: dist/
          if-no-files-found: error
          retention-days: 90
