name: CI

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
          cache: true

      - name: Run tests
        run: go test -count=1 ./...

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci --no-audit --no-fund

      - name: Install rsvg-convert (function icon rasterization)
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin

      - name: Run web tests
        working-directory: web
        run: npm test

  build:
    name: Build (linux/amd64, linux/arm64, linux/armv7)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
          cache: true

      - name: Build binaries
        run: |
          set -euo pipefail
          mkdir -p dist

          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o dist/loco-server-linux-amd64 ./pkgs/bigfred/server
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o dist/bigfred-remote-icmp-linux-amd64 ./pkgs/bigfred/remote-icmp
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o dist/loco-linux-amd64 ./pkgs/loco
          GOOS=linux GOARCH=amd64 go build -o dist/rb-linux-amd64 ./pkgs/rb/main.go

          # Raspberry Pi 5 (BCM2712, Cortex-A76) — linux/arm64
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o dist/loco-server-linux-arm64 ./pkgs/bigfred/server
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o dist/bigfred-remote-icmp-linux-arm64 ./pkgs/bigfred/remote-icmp
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o dist/loco-linux-arm64 ./pkgs/loco
          GOOS=linux GOARCH=arm64 go build -o dist/rb-linux-arm64 ./pkgs/rb/main.go

          # Raspberry Pi 2 (BCM2836, Cortex-A7) — linux/arm, GOARM=7
          CGO_ENABLED=0 GOOS=linux GOARCH=arm GOARM=7 go build -o dist/loco-server-linux-armv7 ./pkgs/bigfred/server
          CGO_ENABLED=0 GOOS=linux GOARCH=arm GOARM=7 go build -o dist/bigfred-remote-icmp-linux-armv7 ./pkgs/bigfred/remote-icmp
          CGO_ENABLED=0 GOOS=linux GOARCH=arm GOARM=7 go build -o dist/loco-linux-armv7 ./pkgs/loco
          GOOS=linux GOARCH=arm GOARM=7 go build -o dist/rb-linux-armv7 ./pkgs/rb/main.go

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: dist/
          if-no-files-found: error
          retention-days: 90
